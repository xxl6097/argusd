name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.21.x", "1.22.x", "1.23.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: go vet
        run: go vet ./...
      - name: go test -race
        run: go test -race -coverprofile=coverage.out ./...
      - name: Coverage report
        if: matrix.go-version == '1.23.x'
        run: go tool cover -func=coverage.out | tail -1

  cross-compile:
    name: Cross-compile for OpenWrt targets
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64, arm, mipsle, mips]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - name: Build argusd (linux/${{ matrix.goarch }})
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath -ldflags="-s -w" \
              -o argusd-linux-${{ matrix.goarch }} ./cmd/argusd
          ls -lh argusd-linux-${{ matrix.goarch }}
      - uses: actions/upload-artifact@v4
        with:
          name: argusd-linux-${{ matrix.goarch }}
          path: argusd-linux-${{ matrix.goarch }}
