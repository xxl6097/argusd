name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
      - name: go vet
        run: go vet ./...
      - name: go test -race
        run: go test -race -coverprofile=coverage.out ./...
      - name: Coverage report
        run: go tool cover -func=coverage.out | tail -1
      - name: Benchmarks (zero-cost DecisionHandler guard)
        run: go test -bench=BenchmarkEmitDecisionNil -benchmem -run=^$ -count=1 ./...

  cross-compile:
    name: Cross-compile ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-amd64,             goos: linux, goarch: amd64 }
          - { name: linux-arm64,             goos: linux, goarch: arm64 }
          - { name: linux-armv7,             goos: linux, goarch: arm,       goarm: "7" }
          - { name: linux-mipsle-softfloat,  goos: linux, goarch: mipsle,    gomips: softfloat }
          - { name: linux-mips-softfloat,    goos: linux, goarch: mips,      gomips: softfloat }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
      - name: Build argusd (${{ matrix.name }})
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
        run: |
          go build -trimpath -ldflags="-s -w" \
              -o argusd-${{ matrix.name }} ./cmd/argusd
          ls -lh argusd-${{ matrix.name }}
