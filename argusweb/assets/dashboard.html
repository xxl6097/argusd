<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e1014">
<title>Argus · 设备监控</title>
<style>
  :root {
    --bg: #0e1014; --fg: #e6e6e6; --muted: #8a8f98; --line: #1e2128;
    --card: #14171d;
    --accent: #4ec9b0; --online: #4ec9b0; --offline: #f07178; --change: #e5c07b;
    --pad-h: max(12px, env(safe-area-inset-left));
    --pad-h-r: max(12px, env(safe-area-inset-right));
    --pad-b: max(12px, env(safe-area-inset-bottom));
  }
  * { box-sizing: border-box; }
  html, body { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; padding: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  /* ---------- Header ---------- */
  header {
    padding: 12px var(--pad-h-r) 12px var(--pad-h);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 10px 16px; flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 500; color: var(--accent); }
  header .sub { color: var(--muted); font-size: 12px; }
  header .status {
    margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap;
    user-select: none; -webkit-user-select: none;
  }

  /* ---------- Pills ---------- */
  .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; white-space: nowrap; }
  .pill.online  { background: rgba(78,201,176,0.15); color: var(--online); }
  .pill.offline { background: rgba(240,113,120,0.15); color: var(--offline); }
  .pill.change  { background: rgba(229,192,123,0.15); color: var(--change); }

  /* ---------- Layout ---------- */
  main {
    padding: 16px var(--pad-h-r) var(--pad-b) var(--pad-h);
    display: grid; gap: 16px;
    grid-template-columns: minmax(0, 1fr) minmax(340px, 420px);
  }
  @media (max-width: 900px) { main { grid-template-columns: minmax(0, 1fr); } }
  section { background: var(--card); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  section > h2 {
    margin: 0; padding: 10px 14px; font-size: 13px; font-weight: 500;
    color: var(--muted); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  section > h2 .sub { margin-left: auto; font-size: 10px; color: var(--muted); }

  /* ---------- Devices (desktop table) ---------- */
  /* table-layout:auto lets columns grow to fit content when the
     viewport has room; only when the sum exceeds viewport width do
     the overflow:hidden + text-overflow:ellipsis rules kick in. */
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: auto; }
  th, td {
    padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--line);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  /* Minimum widths keep columns readable when many are truncating
     simultaneously; max-widths prevent any single wide cell (e.g. a
     long alias) from pushing other columns off-screen. */
  col.col-status { min-width: 80px;  width: 1%; }
  col.col-mac    { min-width: 150px; width: 1%; }
  col.col-ip     { min-width: 130px; }
  col.col-host   { min-width: 140px; }
  col.col-vendor { min-width: 100px; max-width: 200px; }
  col.col-rssi   { min-width: 88px;  width: 1%; }
  col.col-link   { min-width: 120px; width: 1%; }
  th {
    color: var(--muted); font-weight: 500; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  tr:hover td { background: rgba(255,255,255,0.02); }
  td.mac    { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  /* IP cell uses flex so the trailing 📌 button stays visible while
     only the IP text portion truncates with ellipsis. */
  td.ip-cell {
    display: flex; align-items: center; gap: 4px;
    overflow: hidden; white-space: nowrap;
  }
  td.ip-cell > .ip-text {
    flex: 0 1 auto; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  td.ip-cell > .staticip-btn { flex: 0 0 auto; margin-left: 0; margin-right: auto; }
  td.host   { /* host can be long; truncate via default rule, title= shows full */ }
  td.vendor { color: var(--muted); font-size: 12px; }
  .rssi-strong { color: var(--online); }
  .rssi-medium { color: var(--fg); }
  .rssi-weak   { color: var(--change); }
  .rssi-vweak  { color: var(--offline); }

  /* Alias name (user-set); shown prominently; original hostname shrinks to a hint. */
  .alias     { color: var(--accent); font-weight: 500; }
  .orig-host { color: var(--muted); font-size: 11px; }
  .rename-btn {
    display: inline-block; margin-left: 6px; cursor: pointer;
    color: var(--muted); font-size: 12px; user-select: none;
    padding: 0 4px; border-radius: 3px; line-height: 1.4;
  }
  .rename-btn:hover { color: var(--accent); background: rgba(78,201,176,0.08); }

  /* Static IP: 🔒 marker + 📌 action button. */
  .ip-static    { color: var(--accent); font-weight: 500; }
  .staticip-btn {
    display: inline-block; margin-left: 6px; cursor: pointer;
    color: var(--muted); font-size: 12px; user-select: none;
    padding: 0 4px; border-radius: 3px; line-height: 1.4;
  }
  .staticip-btn:hover { color: var(--change); background: rgba(229,192,123,0.12); }

  .card-row .cr-vendor { grid-area: vendor; font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .rename-form { display: inline-flex; gap: 4px; align-items: center; vertical-align: middle; }
  .rename-form input {
    background: #0e1014; color: var(--fg); border: 1px solid var(--line);
    border-radius: 3px; padding: 2px 6px; font-size: 12px; width: 140px;
    font-family: inherit;
  }
  .rename-form input:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
  .rename-form button {
    background: none; border: 1px solid var(--line); color: var(--muted);
    padding: 2px 6px; font-size: 11px; border-radius: 3px; cursor: pointer;
  }
  .rename-form button:hover { border-color: var(--accent); color: var(--accent); }

  /* Offline row: desaturated, so the eye is drawn to the online set first. */
  tr.is-offline td, .card-row.is-offline { opacity: 0.55; }
  tr.is-offline td.mac, .card-row.is-offline .cr-mac { opacity: 0.85; }

  /* ---------- Devices (mobile card list) ---------- */
  .cards { display: none; }
  .card-row {
    padding: 12px 14px; border-bottom: 1px solid var(--line);
    display: grid; gap: 4px 10px;
    grid-template-columns: 1fr auto;
    grid-template-areas:
      "mac    status"
      "host   host"
      "vendor vendor"
      "link   rssi";
  }
  .card-row .cr-mac    { grid-area: mac;    font-family: ui-monospace, Menlo, monospace; font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-row .cr-status { grid-area: status; justify-self: end; }
  .card-row .cr-host   { grid-area: host;   font-size: 12px; color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-row .cr-host .ip { color: var(--muted); }
  .card-row .cr-link   { grid-area: link;   font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-row .cr-rssi   { grid-area: rssi;   font-size: 12px; white-space: nowrap; justify-self: end; }

  /* ---------- Events list ---------- */
  #events-list {
    max-height: 70vh; overflow-y: auto;
    padding: 0; margin: 0; list-style: none;
    -webkit-overflow-scrolling: touch;
  }
  #events-list li {
    padding: 10px 14px; border-bottom: 1px solid var(--line); font-size: 12px;
    display: grid; gap: 4px 8px;
    grid-template-columns: auto 1fr;
    grid-template-areas:
      "ts    pill"
      "mac   detail";
  }
  #events-list li .ts     { grid-area: ts;     color: var(--muted); font-family: ui-monospace, Menlo, monospace; }
  #events-list li .elpill { grid-area: pill;   justify-self: end; }
  #events-list li .mac    { grid-area: mac;    font-family: ui-monospace, Menlo, monospace; }
  #events-list li .detail { grid-area: detail; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .empty { padding: 20px; text-align: center; color: var(--muted); font-style: italic; }

  /* ---------- Footer ---------- */
  footer {
    padding: 10px var(--pad-h-r) calc(10px + var(--pad-b)) var(--pad-h);
    color: var(--muted); font-size: 11px;
    border-top: 1px solid var(--line);
  }
  footer code { background: rgba(255,255,255,0.06); padding: 1px 6px; border-radius: 3px; font-size: 11px; }

  /* ---------- Static-IP modal ---------- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; padding: 16px;
    animation: fadeIn 0.12s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  .modal {
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    padding: 20px; width: 100%; max-width: 380px;
    box-shadow: 0 10px 32px rgba(0,0,0,0.6);
  }
  .modal-title { font-size: 15px; font-weight: 500; color: var(--accent); margin-bottom: 4px; }
  .modal-sub   { font-size: 11px; color: var(--muted); margin-bottom: 14px; }
  .modal-sub code { background: rgba(255,255,255,0.06); padding: 1px 6px; border-radius: 3px; }
  .modal-field { display: block; margin-bottom: 12px; }
  .modal-field span { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .modal-field.modal-checkbox {
    display: flex; gap: 8px; align-items: flex-start;
    background: rgba(229,192,123,0.05); border-left: 2px solid var(--change);
    padding: 8px 10px; border-radius: 2px;
  }
  .modal-field.modal-checkbox input { width: auto; margin-top: 3px; flex: 0 0 auto; }
  .modal-field.modal-checkbox .cb-label { display: block; margin: 0; font-size: 12px; color: var(--fg); }
  .modal-field.modal-checkbox .cb-label b { color: var(--change); font-weight: 500; }
  .modal-field.modal-checkbox .cb-label small { color: var(--muted); font-size: 11px; line-height: 1.5; }
  .modal-field.modal-checkbox .cb-label code { background: rgba(255,255,255,0.06); padding: 1px 4px; border-radius: 2px; }
  .modal-field input {
    width: 100%; background: #0e1014; color: var(--fg);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 6px 8px; font-size: 13px; font-family: inherit;
  }
  .modal-field input:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
  .modal-hint {
    font-size: 11px; color: var(--muted);
    background: rgba(229,192,123,0.08); border-left: 2px solid var(--change);
    padding: 6px 10px; border-radius: 2px; margin-bottom: 14px;
  }
  .modal-actions {
    display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap;
  }
  .modal-actions button {
    background: none; border: 1px solid var(--line); color: var(--fg);
    padding: 6px 12px; font-size: 12px; border-radius: 4px; cursor: pointer;
    font-family: inherit;
  }
  .modal-actions button:hover  { border-color: var(--muted); }
  .modal-actions .btn-primary  { background: var(--accent); color: #0e1014; border-color: var(--accent); font-weight: 500; }
  .modal-actions .btn-primary:hover { opacity: 0.9; }
  .modal-actions .btn-danger   { color: var(--offline); border-color: rgba(240,113,120,0.4); }
  .modal-actions .btn-danger:hover { background: rgba(240,113,120,0.1); }

  /* ---------- Toast (post-DHCP feedback) ---------- */
  .toast {
    position: fixed; left: 50%; bottom: calc(20px + var(--pad-b));
    transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--accent); border-radius: 8px;
    padding: 12px 18px; max-width: 92vw; width: auto;
    color: var(--fg); font-size: 13px; line-height: 1.6;
    box-shadow: 0 6px 24px rgba(0,0,0,0.55);
    z-index: 10000; opacity: 1; transition: opacity 0.4s ease-out;
  }
  .toast b { color: var(--accent); font-weight: 500; }
  .toast.fade { opacity: 0; }

  /* ---------- Mobile breakpoint ---------- */
  @media (max-width: 640px) {
    header { padding: 10px var(--pad-h-r) 10px var(--pad-h); gap: 8px 12px; }
    header h1 { font-size: 16px; }
    header .sub { font-size: 11px; }
    header .status { margin-left: 0; width: 100%; }
    main { padding: 12px var(--pad-h-r) var(--pad-b) var(--pad-h); gap: 12px; }
    section > h2 { padding: 10px 12px; font-size: 12px; }
    .devices-table { display: none; }
    .cards { display: block; }
    #events-list { max-height: none; overflow: visible; }
  }
</style>
</head>
<body>
<header>
  <h1>Argus</h1>
  <span class="sub">设备监控</span>
  <span class="status" id="status">
    <span class="pill" id="conn" style="background: rgba(138,143,152,0.15); color: var(--muted);">连接中…</span>
    <span class="pill online" id="count-online" title="在线设备数">在线 0</span>
    <span class="pill offline" id="count-offline" title="离线设备数">离线 0</span>
  </span>
</header>
<main>
  <section>
    <h2>已知设备</h2>
    <!-- Desktop / tablet view -->
    <table class="devices-table">
      <colgroup>
        <col class="col-status">
        <col class="col-mac">
        <col class="col-ip">
        <col class="col-host">
        <col class="col-vendor">
        <col class="col-rssi">
        <col class="col-link">
      </colgroup>
      <thead><tr>
        <th>状态</th>
        <th>MAC</th>
        <th>IP</th>
        <th>主机名</th>
        <th>厂商</th>
        <th>信号</th>
        <th>类型</th>
      </tr></thead>
      <tbody id="devices-body"></tbody>
    </table>
    <!-- Mobile view -->
    <div class="cards" id="devices-cards"></div>
  </section>
  <section>
    <h2>实时事件流
      <span class="sub">SSE · /api/events</span>
    </h2>
    <ul id="events-list"><li class="empty" style="display:block;">等待事件…</li></ul>
  </section>
</main>
<footer>
  Argus · 百眼守望者 ·
  <code>GET /api/devices</code>
  <code>GET /api/events</code>
</footer>
<script>
(function () {
  "use strict";

  const elBody         = document.getElementById("devices-body");
  const elCards        = document.getElementById("devices-cards");
  const elEvents       = document.getElementById("events-list");
  const elCountOnline  = document.getElementById("count-online");
  const elCountOffline = document.getElementById("count-offline");
  const elConn         = document.getElementById("conn");

  const MAX_EVENT_LINES = 200;
  let eventsStarted = false;

  function rssiClass(r) {
    if (!r || r === 0) return "";
    if (r >= -55) return "rssi-strong";
    if (r >= -70) return "rssi-medium";
    if (r >= -80) return "rssi-weak";
    return "rssi-vweak";
  }

  function esc(s) {
    if (s == null) return "";
    return String(s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    })[c]);
  }

  function linkText(d) {
    if (d.wired) return "有线";
    return [d.radio, d.ssid && "/" + d.ssid].filter(Boolean).join("");
  }

  function rssiText(d) {
    return d.rssi ? d.rssi + " dBm" : "—";
  }

  function renderDevices(rows) {
    let onlineN = 0, offlineN = 0;
    const caps = window._caps || {};
    const leases = window._staticLeases || {};

    // Desktop table
    elBody.innerHTML = "";
    for (const d of rows) {
      const isOff = d.status === "offline";
      if (isOff) offlineN++; else onlineN++;
      const tr = document.createElement("tr");
      if (isOff) tr.classList.add("is-offline");
      tr.dataset.mac = d.mac;
      const offAgo = relativeTime(d.offline_at_ms);
      const statusPill = isOff
        ? '<span class="pill offline" title="离线于 ' + esc(offAgo) + '">离线 ' + esc(offAgo) + '</span>'
        : '<span class="pill online">在线</span>';
      const hostTitle = (d.alias ? d.alias + (d.hostname ? " (" + d.hostname + ")" : "") : (d.hostname || ""));
      const vendor = d.vendor || "—";
      const link = linkText(d);
      tr.innerHTML =
        '<td>' + statusPill + '</td>' +
        '<td class="mac" title="' + esc(d.mac) + '">' + esc(d.mac) + '</td>' +
        '<td class="ip-cell" title="' + esc(d.ip || "") + '">' + ipCell(d, caps, leases) + '</td>' +
        '<td class="host" title="' + esc(hostTitle) + '">' + hostCell(d) + '</td>' +
        '<td class="vendor" title="' + esc(vendor) + '">' + esc(vendor) + '</td>' +
        '<td class="' + rssiClass(d.rssi) + '" title="' + esc(rssiText(d)) + '">' + esc(rssiText(d)) + '</td>' +
        '<td title="' + esc(link) + '">' + esc(link) + '</td>';
      elBody.appendChild(tr);
    }

    // Mobile cards
    elCards.innerHTML = "";
    for (const d of rows) {
      const isOff = d.status === "offline";
      const card = document.createElement("div");
      card.className = "card-row" + (isOff ? " is-offline" : "");
      card.dataset.mac = d.mac;
      const offAgo = relativeTime(d.offline_at_ms);
      const statusPill = isOff
        ? '<span class="pill offline">离线 ' + esc(offAgo) + '</span>'
        : '<span class="pill online">在线</span>';
      const vendorRow = d.vendor
        ? '<div class="cr-vendor" title="' + esc(d.vendor) + '">厂商 ' + esc(d.vendor) + '</div>'
        : '';
      const hostTitle = (d.alias ? d.alias + (d.hostname ? " (" + d.hostname + ")" : "") : (d.hostname || ""));
      card.innerHTML =
        '<div class="cr-mac" title="' + esc(d.mac) + '">' + esc(d.mac) + '</div>' +
        '<div class="cr-status">' + statusPill + '</div>' +
        '<div class="cr-host" title="' + esc(hostTitle) + '">' + hostCell(d) + ' <span class="ip">· ' + ipCell(d, caps, leases) + '</span></div>' +
        vendorRow +
        '<div class="cr-link" title="' + esc(linkText(d)) + '">' + esc(linkText(d)) + '</div>' +
        '<div class="cr-rssi ' + rssiClass(d.rssi) + '">' + esc(rssiText(d)) + '</div>';
      elCards.appendChild(card);
    }

    elCountOnline.textContent  = "在线 " + onlineN;
    elCountOffline.textContent = "离线 " + offlineN;
  }

  // ipCell renders the IP with an optional 🔒 lock icon (static
  // reservation) and a 📌 button to open the static-IP modal.
  function ipCell(d, caps, leases) {
    const ip = d.ip || "—";
    const lease = leases[d.mac];
    const isStatic = !!lease;
    let html = isStatic
      ? '<span class="ip-text ip-static" title="已静态分配">🔒 ' + esc(ip) + '</span>'
      : '<span class="ip-text">' + esc(ip) + '</span>';
    if (caps.dhcp) {
      html += '<span class="staticip-btn" data-action="staticip" title="设为静态 IP">📌</span>';
    }
    return html;
  }

  // hostCell builds the hostname cell with an optional alias prefix
  // and a pencil (✎) button that toggles inline rename.
  function hostCell(d) {
    const hasAlias = d.alias && d.alias.length > 0;
    const origHost = d.hostname || "";
    let inner;
    if (hasAlias) {
      inner = '<span class="alias">' + esc(d.alias) + '</span>';
      if (origHost && origHost !== d.mac && origHost.replace(/:/g,"") !== d.mac.replace(/:/g,"")) {
        inner += ' <span class="orig-host">(' + esc(origHost) + ')</span>';
      }
    } else {
      inner = esc(origHost || "—");
    }
    inner += '<span class="rename-btn" data-action="rename" title="重命名">✎</span>';
    return inner;
  }

  // Delegate click events on pencil / pin buttons.
  document.addEventListener("click", ev => {
    const renameBtn = ev.target.closest(".rename-btn");
    if (renameBtn) {
      const host = renameBtn.closest(".host, .cr-host");
      const row  = renameBtn.closest("[data-mac]");
      if (host && row) openRenameForm(host, row.dataset.mac);
      return;
    }
    const staticBtn = ev.target.closest(".staticip-btn");
    if (staticBtn) {
      const row = staticBtn.closest("[data-mac]");
      if (row) openStaticIPModal(row.dataset.mac);
      return;
    }
  });

  // openStaticIPModal shows a modal asking for an IP to reserve.
  function openStaticIPModal(mac) {
    const leases = window._staticLeases || {};
    const existing = leases[mac];
    const row = document.querySelector('[data-mac="' + cssEsc(mac) + '"]');
    const currentIP = (() => {
      if (existing) return existing.ip;
      const ipCell = row && row.querySelector(".ip-cell");
      if (!ipCell) return "";
      const m = ipCell.textContent.match(/\d+\.\d+\.\d+\.\d+/);
      return m ? m[0] : "";
    })();

    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML =
      '<div class="modal">' +
      '<div class="modal-title">静态 IP</div>' +
      '<div class="modal-sub">MAC: <code>' + esc(mac) + '</code></div>' +
      '<label class="modal-field">' +
      '  <span>IP 地址</span>' +
      '  <input type="text" id="modal-ip" value="' + esc(currentIP) + '" placeholder="192.168.10.50" />' +
      '</label>' +
      '<label class="modal-field">' +
      '  <span>名称(可选)</span>' +
      '  <input type="text" id="modal-name" maxlength="63" placeholder="argus-auto" value="' + esc(existing ? existing.name : "") + '" />' +
      '</label>' +
      '<label class="modal-field modal-checkbox">' +
      '  <input type="checkbox" id="modal-restart-wifi" />' +
      '  <span class="cb-label">' +
      '    <b>立即生效 (重启 WiFi)</b><br>' +
      '    <small>勾选后会 <code>wifi reload</code> / 重启 ahsapd, ' +
      '全部 WiFi 客户端会瞬断 3~5 秒后自动重连,新 IP 立刻生效。' +
      '<br>不勾选则只写配置 + 尝试踢该设备; 若厂商固件不支持单机踢 ' +
      '(如 MTK C-Life), 需用户手动在设备上关开一次 WiFi 才能生效。</small>' +
      '  </span>' +
      '</label>' +
      '<div class="modal-hint">保存后网关会重载 dnsmasq。租约类型: 永久 (infinite)。</div>' +
      '<div class="modal-actions">' +
      (existing ? '<button data-act="remove" class="btn-danger">移除</button>' : '') +
      '<button data-act="cancel">取消</button>' +
      '<button data-act="save" class="btn-primary">保存</button>' +
      '</div>' +
      '</div>';
    document.body.appendChild(overlay);

    const close = () => overlay.remove();
    const ipIn        = overlay.querySelector("#modal-ip");
    const nameIn      = overlay.querySelector("#modal-name");
    const restartChk  = overlay.querySelector("#modal-restart-wifi");
    ipIn.focus();
    ipIn.select();

    // apiURL appends ?restart_wifi=1 when the user has opted into the
    // nuclear option. The server treats its absence as "just write config
    // + try per-station kick" (Plan A), and presence as "also run
    // wifi reload / ahsapd restart" (Plan C).
    const apiURL = () =>
      "/api/dhcp" + (restartChk && restartChk.checked ? "?restart_wifi=1" : "");

    const doPost = async (body) => {
      try {
        const r = await fetch(apiURL(), {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify(body),
        });
        const b = await r.json().catch(() => ({}));
        if (r.status === 409 && b.owner_mac) {
          // IP is already reserved for a different MAC. Offer to
          // transfer the reservation: delete the existing owner's
          // reservation, then retry the POST. Cancel leaves both
          // reservations unchanged.
          const ok = confirm(
            "IP 冲突: " + b.ip + " 已被另一台设备占用\n" +
            "占用者 MAC: " + b.owner_mac + "\n\n" +
            "是否替换? 点“确定”会先移除占用者的静态分配,再把此 IP 分配给当前设备。\n" +
            "点“取消”则保持原样。"
          );
          if (!ok) return;
          const delR = await fetch("/api/dhcp?mac=" + encodeURIComponent(b.owner_mac), {method: "DELETE"});
          if (!delR.ok) {
            const db = await delR.json().catch(() => ({}));
            alert("移除原占用者失败: " + (db.error || delR.status));
            return;
          }
          const r2 = await fetch(apiURL(), {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body),
          });
          const b2 = await r2.json().catch(() => ({}));
          if (!r2.ok) {
            alert("替换后保存失败: " + (b2.error || r2.status));
            return;
          }
          close();
          reloadDevices();
          showApplyToast(b2.apply || {}, "已替换");
          return;
        }
        if (!r.ok) {
          alert("操作失败: " + (b.error || r.status));
          return;
        }
        close();
        reloadDevices();
        showApplyToast(b.apply || {}, "保存成功");
      } catch (e) {
        alert("网络错误: " + e.message);
      }
    };
    const doDelete = async () => {
      try {
        const r = await fetch("/api/dhcp?mac=" + encodeURIComponent(mac) +
                              (restartChk && restartChk.checked ? "&restart_wifi=1" : ""),
                              {method: "DELETE"});
        const b = await r.json().catch(() => ({}));
        if (!r.ok) {
          alert("移除失败: " + (b.error || r.status));
          return;
        }
        close();
        reloadDevices();
        showApplyToast(b.apply || {}, "已移除");
      } catch (e) {
        alert("网络错误: " + e.message);
      }
    };

    overlay.addEventListener("click", ev => {
      if (ev.target === overlay) { close(); return; }
      const b = ev.target.closest("button");
      if (!b) return;
      if (b.dataset.act === "cancel") close();
      if (b.dataset.act === "save")   doPost({mac, ip: ipIn.value.trim(), name: nameIn.value.trim()});
      if (b.dataset.act === "remove") doDelete();
    });
    overlay.addEventListener("keydown", ev => {
      if (ev.key === "Escape") close();
      if (ev.key === "Enter" && ev.target.tagName === "INPUT") {
        doPost({mac, ip: ipIn.value.trim(), name: nameIn.value.trim()});
      }
    });
  }

  function cssEsc(s) { return String(s).replace(/"/g, '\\"'); }

  // showApplyToast renders a bottom-anchored toast describing what
  // happened after a DHCP change. The server returns an "apply" object
  // with three fields: reloaded[] (init scripts that reloaded),
  // pruned[] (lease files pruned), kicked (non-empty if the station
  // was disconnected). Surfaces all three so the user knows whether
  // the device is getting a fresh IP NOW or needs to renew on its own.
  function showApplyToast(apply, action) {
    const parts = [];
    if (apply.reloaded && apply.reloaded.length) {
      parts.push("已重载: " + apply.reloaded.join(", "));
    } else {
      parts.push("未找到 DHCP 守护进程可重载");
    }
    if (apply.pruned && apply.pruned.length) {
      parts.push("已清除旧租约 (" + apply.pruned.length + " 个)");
    }
    if (apply.arp_flushed) {
      parts.push("已清除 ARP 缓存 (旧 IP " + apply.arp_flushed + ")");
    }
    if (apply.wifi_restarted) {
      parts.push("已重启 WiFi (" + apply.wifi_restarted + "),全部设备将在数秒内重连并拿到新 IP");
    } else if (apply.kicked) {
      parts.push("已踢出该设备 30s,正在重连并重新申请 IP");
    } else if (apply.reloaded && apply.reloaded.length) {
      parts.push("设备需要下次续约后才会拿到新 IP(最长 12 小时)。手动关开 WiFi 可立即生效");
    }
    const t = document.createElement("div");
    t.className = "toast";
    t.innerHTML = '<b>' + esc(action) + '</b><br>' + parts.map(esc).join('<br>');
    document.body.appendChild(t);
    setTimeout(() => t.classList.add("fade"), 5500);
    setTimeout(() => t.remove(), 6000);
  }

  function openRenameForm(hostEl, mac) {
    const original = hostEl.innerHTML;
    const currentAlias = hostEl.querySelector(".alias");
    const initialValue = currentAlias ? currentAlias.textContent : "";

    hostEl.innerHTML =
      '<span class="rename-form">' +
      '<input type="text" value="' + esc(initialValue) + '" maxlength="64" placeholder="别名" />' +
      '<button data-act="save">保存</button>' +
      '<button data-act="clear">清除</button>' +
      '<button data-act="cancel">取消</button>' +
      '</span>';

    const form  = hostEl.querySelector(".rename-form");
    const input = form.querySelector("input");
    input.focus();
    input.select();

    const restore = () => { hostEl.innerHTML = original; };
    const submit  = async (name) => {
      try {
        const r = await fetch("/api/aliases", {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ mac, name }),
        });
        if (!r.ok) {
          const body = await r.json().catch(() => ({}));
          alert("保存失败: " + (body.error || r.status));
          restore();
          return;
        }
        reloadDevices();
      } catch (e) {
        alert("网络错误: " + e.message);
        restore();
      }
    };

    form.addEventListener("click", ev => {
      const b = ev.target.closest("button");
      if (!b) return;
      if (b.dataset.act === "save")   submit(input.value);
      if (b.dataset.act === "clear")  submit("");
      if (b.dataset.act === "cancel") restore();
    });
    input.addEventListener("keydown", ev => {
      if (ev.key === "Enter")  submit(input.value);
      if (ev.key === "Escape") restore();
    });
  }

  // relativeTime renders a unix-ms timestamp as a compact Chinese
  // relative string: "刚刚" / "N秒前" / "N分钟前" / "N小时前" / "N天前".
  function relativeTime(ms) {
    if (!ms) return "";
    const delta = Math.max(0, Date.now() - ms);
    const s = Math.floor(delta / 1000);
    if (s < 10) return "刚刚";
    if (s < 60) return s + "秒前";
    const m = Math.floor(s / 60);
    if (m < 60) return m + "分钟前";
    const h = Math.floor(m / 60);
    if (h < 24) return h + "小时前";
    const d = Math.floor(h / 24);
    return d + "天前";
  }

  async function reloadDevices() {
    try {
      const r = await fetch("/api/devices", { cache: "no-store" });
      const body = await r.json();
      window._caps = body.capabilities || {};
      if (window._caps.dhcp) {
        try {
          const lr = await fetch("/api/dhcp", { cache: "no-store" });
          if (lr.ok) {
            const lb = await lr.json();
            window._staticLeases = lb.leases || {};
          }
        } catch (_) { /* non-fatal */ }
      } else {
        window._staticLeases = {};
      }
      renderDevices(body.devices || []);
    } catch (err) {
      console.warn("reload failed", err);
    }
  }

  function addEventLine(kind, data) {
    if (!eventsStarted) {
      elEvents.innerHTML = "";
      eventsStarted = true;
    }

    const ts = new Date(data.time).toLocaleTimeString();
    const mac = (data.device && data.device.mac) ? data.device.mac.toUpperCase() : "";

    // Coalesce noisy reconnect bursts.
    const now = Date.now();
    const top = elEvents.firstElementChild;
    if (top && top.dataset && top.dataset.mac === mac &&
        (now - Number(top.dataset.ts || 0)) < 10000) {
      const prevKind = top.dataset.kind;
      let newKind = prevKind;
      if (prevKind === "OFFLINE" && kind === "ONLINE")      newKind = "RECONNECT";
      else if (prevKind === "ONLINE" && kind === "OFFLINE") newKind = "FLAP";
      else if (kind === "CHANGE")                           newKind = prevKind;
      else                                                  newKind = kind;
      renderEventRow(top, newKind, data, ts, mac);
      top.dataset.kind = newKind;
      top.dataset.ts   = String(now);
      return;
    }

    const li = document.createElement("li");
    li.dataset.mac  = mac;
    li.dataset.kind = kind;
    li.dataset.ts   = String(now);
    renderEventRow(li, kind, data, ts, mac);
    elEvents.insertBefore(li, elEvents.firstChild);
    while (elEvents.children.length > MAX_EVENT_LINES) {
      elEvents.removeChild(elEvents.lastChild);
    }
  }

  function renderEventRow(li, kind, data, ts, mac) {
    const pillClass =
      kind === "ONLINE"    ? "online"  :
      kind === "OFFLINE"   ? "offline" :
      kind === "RECONNECT" ? "online"  :
      kind === "FLAP"      ? "offline" :
                              "change";
    const label =
      kind === "ONLINE"    ? "上线"    :
      kind === "OFFLINE"   ? "离线"    :
      kind === "RECONNECT" ? "重连"    :
      kind === "FLAP"      ? "抖动"    :
                              "变更";
    let detail = "";
    if (kind === "CHANGE" && data.changes) {
      detail = data.changes.map(c => c.field + ": " + c.old + "→" + c.new).join(", ");
    } else if (data.device) {
      detail = [data.device.ip, data.device.hostname, data.device.ssid]
        .filter(Boolean).join(" · ");
    }
    li.innerHTML =
      '<span class="ts">' + esc(ts) + '</span>' +
      '<span class="elpill pill ' + pillClass + '">' + esc(label) + '</span>' +
      '<span class="mac">' + esc(mac) + '</span>' +
      '<span class="detail" title="' + esc(detail) + '">' + esc(detail) + '</span>';
  }

  function connectSSE() {
    const es = new EventSource("/api/events");
    es.addEventListener("hello", () => {
      elConn.textContent = "已连接";
      elConn.style.background = "rgba(78,201,176,0.15)";
      elConn.style.color = "var(--online)";
    });
    ["ONLINE", "OFFLINE", "CHANGE"].forEach(kind => {
      es.addEventListener(kind, ev => {
        try {
          const data = JSON.parse(ev.data);
          addEventLine(kind, data);
          reloadDevices();
        } catch (e) { console.warn("parse event failed", e); }
      });
    });
    es.onerror = () => {
      elConn.textContent = "重连中…";
      elConn.style.background = "rgba(240,113,120,0.15)";
      elConn.style.color = "var(--offline)";
    };
  }

  reloadDevices();
  connectSSE();
  setInterval(reloadDevices, 30000);
})();
</script>
</body>
</html>
