<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e1014">
<title>Argus · 设备监控</title>
<style>
  :root {
    --bg: #0e1014; --fg: #e6e6e6; --muted: #8a8f98; --line: #1e2128;
    --card: #14171d;
    --accent: #4ec9b0; --online: #4ec9b0; --offline: #f07178; --change: #e5c07b;
    /* Safe-area padding on notched devices */
    --pad-h: max(12px, env(safe-area-inset-left));
    --pad-h-r: max(12px, env(safe-area-inset-right));
    --pad-b: max(12px, env(safe-area-inset-bottom));
  }
  * { box-sizing: border-box; }
  html, body { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; padding: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  /* ---------- Header ---------- */
  header {
    padding: 12px var(--pad-h-r) 12px var(--pad-h);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 10px 16px; flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 500; color: var(--accent); }
  header .sub { color: var(--muted); font-size: 12px; }
  header .status {
    margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap;
    user-select: none; -webkit-user-select: none;
  }

  /* ---------- Pills ---------- */
  .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; white-space: nowrap; }
  .pill.online  { background: rgba(78,201,176,0.15); color: var(--online); }
  .pill.offline { background: rgba(240,113,120,0.15); color: var(--offline); }
  .pill.change  { background: rgba(229,192,123,0.15); color: var(--change); }

  /* ---------- Layout ---------- */
  main {
    padding: 16px var(--pad-h-r) var(--pad-b) var(--pad-h);
    display: grid; gap: 16px;
    grid-template-columns: minmax(0, 1fr) minmax(340px, 420px);
  }
  @media (max-width: 900px) { main { grid-template-columns: minmax(0, 1fr); } }
  section { background: var(--card); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  section > h2 {
    margin: 0; padding: 10px 14px; font-size: 13px; font-weight: 500;
    color: var(--muted); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  section > h2 .sub { margin-left: auto; font-size: 10px; color: var(--muted); }

  /* ---------- Devices (desktop table) ---------- */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--line); }
  th {
    color: var(--muted); font-weight: 500; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  tr:hover td { background: rgba(255,255,255,0.02); }
  td.mac { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; word-break: keep-all; }
  td.host { word-break: break-all; }
  .rssi-strong  { color: var(--online); }
  .rssi-medium  { color: var(--fg); }
  .rssi-weak    { color: var(--change); }
  .rssi-vweak   { color: var(--offline); }

  /* ---------- Devices (mobile card list) ---------- */
  .cards { display: none; }
  .card-row {
    padding: 12px 14px; border-bottom: 1px solid var(--line);
    display: grid; gap: 4px 10px;
    grid-template-columns: 1fr auto;
    grid-template-areas:
      "mac   rssi"
      "host  host"
      "link  link";
  }
  .card-row .cr-mac  { grid-area: mac;  font-family: ui-monospace, Menlo, monospace; font-size: 13px; font-weight: 500; }
  .card-row .cr-rssi { grid-area: rssi; font-size: 12px; white-space: nowrap; }
  .card-row .cr-host { grid-area: host; font-size: 12px; color: var(--fg); word-break: break-all; }
  .card-row .cr-host .ip { color: var(--muted); }
  .card-row .cr-link { grid-area: link; font-size: 11px; color: var(--muted); }

  /* ---------- Events list ---------- */
  #events-list {
    max-height: 70vh; overflow-y: auto;
    padding: 0; margin: 0; list-style: none;
    -webkit-overflow-scrolling: touch;
  }
  #events-list li {
    padding: 10px 14px; border-bottom: 1px solid var(--line); font-size: 12px;
    display: grid; gap: 4px 8px;
    grid-template-columns: auto 1fr;
    grid-template-areas:
      "ts    pill"
      "mac   detail";
  }
  #events-list li .ts     { grid-area: ts;     color: var(--muted); font-family: ui-monospace, Menlo, monospace; }
  #events-list li .elpill { grid-area: pill;   justify-self: end; }
  #events-list li .mac    { grid-area: mac;    font-family: ui-monospace, Menlo, monospace; }
  #events-list li .detail { grid-area: detail; color: var(--muted); word-break: break-all; }
  .empty { padding: 20px; text-align: center; color: var(--muted); font-style: italic; }

  /* ---------- Footer ---------- */
  footer {
    padding: 10px var(--pad-h-r) calc(10px + var(--pad-b)) var(--pad-h);
    color: var(--muted); font-size: 11px;
    border-top: 1px solid var(--line);
  }
  footer code { background: rgba(255,255,255,0.06); padding: 1px 6px; border-radius: 3px; font-size: 11px; }

  /* ---------- Mobile breakpoint ---------- */
  @media (max-width: 640px) {
    header { padding: 10px var(--pad-h-r) 10px var(--pad-h); gap: 8px 12px; }
    header h1 { font-size: 16px; }
    header .sub { font-size: 11px; }
    header .status { margin-left: 0; width: 100%; }    /* stack below title */
    main { padding: 12px var(--pad-h-r) var(--pad-b) var(--pad-h); gap: 12px; }
    section > h2 { padding: 10px 12px; font-size: 12px; }

    /* Hide the desktop table; show the card list instead */
    .devices-table { display: none; }
    .cards { display: block; }

    /* Event list: drop inner scroll so the whole page scrolls on phones */
    #events-list { max-height: none; overflow: visible; }
  }
</style>
</head>
<body>
<header>
  <h1>Argus</h1>
  <span class="sub">设备监控 · Device Monitor</span>
  <span class="status" id="status">
    <span class="pill" id="conn" style="background: rgba(138,143,152,0.15); color: var(--muted);">连接中…</span>
    <span class="pill online" id="count">0 台</span>
  </span>
</header>
<main>
  <section>
    <h2>已知设备 · Known Devices</h2>
    <!-- Desktop / tablet view -->
    <table class="devices-table">
      <thead><tr>
        <th>MAC</th><th>IP</th><th>主机名 · Host</th>
        <th>信号 · RSSI</th><th>类型 · Link</th>
      </tr></thead>
      <tbody id="devices-body"></tbody>
    </table>
    <!-- Mobile view -->
    <div class="cards" id="devices-cards"></div>
  </section>
  <section>
    <h2>实时事件流 · Live Events
      <span class="sub">SSE · /api/events</span>
    </h2>
    <ul id="events-list"><li class="empty" style="display:block;">等待事件… · waiting for events…</li></ul>
  </section>
</main>
<footer>
  Argus · 百眼守望者 · local dashboard ·
  <code>GET /api/devices</code> <code>GET /api/events</code> (SSE)
</footer>
<script>
(function () {
  "use strict";

  const elBody   = document.getElementById("devices-body");
  const elCards  = document.getElementById("devices-cards");
  const elEvents = document.getElementById("events-list");
  const elCount  = document.getElementById("count");
  const elConn   = document.getElementById("conn");

  const MAX_EVENT_LINES = 200;
  let eventsStarted = false;

  function rssiClass(r) {
    if (!r || r === 0) return "";
    if (r >= -55) return "rssi-strong";
    if (r >= -70) return "rssi-medium";
    if (r >= -80) return "rssi-weak";
    return "rssi-vweak";
  }

  function esc(s) {
    if (s == null) return "";
    return String(s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    })[c]);
  }

  function linkText(d) {
    if (d.wired) return "有线 wired";
    return [d.radio, d.ssid && "/" + d.ssid].filter(Boolean).join("");
  }

  function rssiText(d) {
    return d.rssi ? d.rssi + " dBm" : "—";
  }

  function renderDevices(rows) {
    // Desktop table
    elBody.innerHTML = "";
    for (const d of rows) {
      const tr = document.createElement("tr");
      tr.innerHTML =
        '<td class="mac">' + esc(d.mac) + '</td>' +
        '<td>' + esc(d.ip || "—") + '</td>' +
        '<td class="host">' + esc(d.hostname || "—") + '</td>' +
        '<td class="' + rssiClass(d.rssi) + '">' + esc(rssiText(d)) + '</td>' +
        '<td>' + esc(linkText(d)) + '</td>';
      elBody.appendChild(tr);
    }

    // Mobile cards
    elCards.innerHTML = "";
    for (const d of rows) {
      const card = document.createElement("div");
      card.className = "card-row";
      const host = d.hostname || "—";
      const ip   = d.ip || "—";
      card.innerHTML =
        '<div class="cr-mac">' + esc(d.mac) + '</div>' +
        '<div class="cr-rssi ' + rssiClass(d.rssi) + '">' + esc(rssiText(d)) + '</div>' +
        '<div class="cr-host">' + esc(host) + ' <span class="ip">· ' + esc(ip) + '</span></div>' +
        '<div class="cr-link">' + esc(linkText(d)) + '</div>';
      elCards.appendChild(card);
    }

    elCount.textContent = rows.length + " 台";
  }

  async function reloadDevices() {
    try {
      const r = await fetch("/api/devices", { cache: "no-store" });
      const body = await r.json();
      renderDevices(body.devices || []);
    } catch (err) {
      console.warn("reload failed", err);
    }
  }

  function addEventLine(kind, data) {
    if (!eventsStarted) {
      elEvents.innerHTML = "";
      eventsStarted = true;
    }
    const li = document.createElement("li");
    const ts = new Date(data.time).toLocaleTimeString();
    const mac = (data.device && data.device.mac) ? data.device.mac.toUpperCase() : "";
    const pillClass =
      kind === "ONLINE"  ? "online"  :
      kind === "OFFLINE" ? "offline" : "change";
    const label =
      kind === "ONLINE"  ? "上线 ONLINE"  :
      kind === "OFFLINE" ? "离线 OFFLINE" : "变更 CHANGE";
    let detail = "";
    if (kind === "CHANGE" && data.changes) {
      detail = data.changes.map(c => c.field + ": " + c.old + "→" + c.new).join(", ");
    } else if (data.device) {
      detail = [data.device.ip, data.device.hostname, data.device.ssid]
        .filter(Boolean).join(" · ");
    }
    li.innerHTML =
      '<span class="ts">' + esc(ts) + '</span>' +
      '<span class="elpill pill ' + pillClass + '">' + esc(label) + '</span>' +
      '<span class="mac">' + esc(mac) + '</span>' +
      '<span class="detail">' + esc(detail) + '</span>';
    elEvents.insertBefore(li, elEvents.firstChild);
    while (elEvents.children.length > MAX_EVENT_LINES) {
      elEvents.removeChild(elEvents.lastChild);
    }
  }

  function connectSSE() {
    const es = new EventSource("/api/events");
    es.addEventListener("hello", () => {
      elConn.textContent = "已连接 connected";
      elConn.style.background = "rgba(78,201,176,0.15)";
      elConn.style.color = "var(--online)";
    });
    ["ONLINE", "OFFLINE", "CHANGE"].forEach(kind => {
      es.addEventListener(kind, ev => {
        try {
          const data = JSON.parse(ev.data);
          addEventLine(kind, data);
          reloadDevices();
        } catch (e) { console.warn("parse event failed", e); }
      });
    });
    es.onerror = () => {
      elConn.textContent = "重连中… reconnecting";
      elConn.style.background = "rgba(240,113,120,0.15)";
      elConn.style.color = "var(--offline)";
    };
  }

  reloadDevices();
  connectSSE();
  setInterval(reloadDevices, 30000);
})();
</script>
</body>
</html>
